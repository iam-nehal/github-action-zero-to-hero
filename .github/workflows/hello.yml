#this is the name of the workflow
name: Hello

#runs on an automatic trigger, whenever change is pushed to branch deployment.
on: 
  push:
    branches: [main]
#whever there is a change in .html file then run the job   
    paths:
      - '**.html'

#these are jobs inside the workflow
jobs:

#this is the name of the job1

  greet:
  #this is github runner, each job runs on a runner
    runs-on: ubuntu-latest
    env:
      MY_NAME: Nehal
    steps:
      - name: say hello to user
        run: echo "Hello Dosto"

      - name: say hello to Nehal
        run: echo "Hello $MY_NAME"

#this is the name of the job1        
  versions:
    runs-on: ubuntu-latest
    steps:
      - name: version of python & docker
        run: python --version && docker --version
  
        
  
